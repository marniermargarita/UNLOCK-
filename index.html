
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNLOCK</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px 14px;
      background:
        radial-gradient(circle at center, rgba(255, 246, 220, 0.8), rgba(78, 55, 34, 0.45)),
        linear-gradient(135deg, #d8c3a3, #f0e4cf 45%, #b59a76);
      color: #2a1b10;
      font-family: "Yu Mincho", "Hiragino Mincho ProN", "Times New Roman", serif;
    }

    .page-title {
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 0.04em;
      color: #1f3448;
      margin-bottom: 18px;
    }

    .paper {
      position: relative;
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      padding: 30px 24px 28px;
      background:
        radial-gradient(circle at center, rgba(255, 248, 221, 0.95), rgba(205, 177, 127, 0.9)),
        linear-gradient(180deg, #e9d6ad, #c6a777);
      border: 8px solid #1b1714;
      box-shadow:
        0 10px 28px rgba(0, 0, 0, 0.35),
        inset 0 0 45px rgba(78, 39, 10, 0.35);
      overflow: hidden;
    }

    .paper::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(56, 32, 16, 0.5);
      pointer-events: none;
    }

    .paper::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 15% 20%, rgba(55, 30, 10, 0.16), transparent 18%),
        radial-gradient(circle at 80% 15%, rgba(55, 30, 10, 0.12), transparent 20%),
        radial-gradient(circle at 50% 80%, rgba(55, 30, 10, 0.18), transparent 24%),
        repeating-linear-gradient(
          90deg,
          rgba(40, 20, 5, 0.025) 0,
          rgba(40, 20, 5, 0.025) 1px,
          transparent 1px,
          transparent 5px
        );
      mix-blend-mode: multiply;
      pointer-events: none;
    }

    .corner {
      position: absolute;
      width: 52px;
      height: 52px;
      border-color: #1a1511;
      z-index: 2;
    }

    .corner.tl {
      top: 6px;
      left: 6px;
      border-top: 5px solid;
      border-left: 5px solid;
    }

    .corner.tr {
      top: 6px;
      right: 6px;
      border-top: 5px solid;
      border-right: 5px solid;
    }

    .corner.bl {
      bottom: 6px;
      left: 6px;
      border-bottom: 5px solid;
      border-left: 5px solid;
    }

    .corner.br {
      bottom: 6px;
      right: 6px;
      border-bottom: 5px solid;
      border-right: 5px solid;
    }

    .content {
      position: relative;
      z-index: 3;
      text-align: center;
    }

    .logo {
      margin-top: 6px;
      font-family: "Georgia", "Times New Roman", serif;
      font-size: 36px;
      letter-spacing: 0.12em;
      font-weight: 900;
      color: #1b130d;
      text-shadow: 1px 1px 0 rgba(255,255,255,0.25);
    }

    .series {
      margin-top: -2px;
      font-size: 11px;
      letter-spacing: 0.32em;
      color: #3a2415;
    }

    .ornament {
      margin: 12px auto 18px;
      width: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #3b2719;
    }

    .ornament::before,
    .ornament::after {
      content: "";
      height: 1px;
      flex: 1;
      background: #3b2719;
      opacity: 0.65;
    }

    .ornament span {
      font-size: 14px;
    }

    .lead {
      margin: 16px 0 18px;
      line-height: 2;
      font-size: 14px;
      color: #2f2015;
    }

    .photo-frame {
      margin: 18px auto 22px;
      padding: 8px;
      width: 92%;
      background: rgba(245, 232, 200, 0.85);
      border: 1px solid rgba(60, 35, 18, 0.55);
      transform: rotate(-2deg);
      box-shadow: 0 8px 14px rgba(54, 30, 10, 0.35);
    }

    .photo {
      height: 132px;
      background:
        linear-gradient(rgba(30, 24, 18, 0.15), rgba(30, 24, 18, 0.15)),
        radial-gradient(circle at 55% 42%, #6f654f 0 4px, transparent 5px),
        linear-gradient(160deg, #514635 0%, #9a8a6d 46%, #423729 100%);
      border: 1px solid rgba(40, 25, 15, 0.6);
      filter: sepia(0.7) contrast(1.1);
      position: relative;
      overflow: hidden;
    }

    .photo::before {
      content: "";
      position: absolute;
      left: 12%;
      bottom: 0;
      width: 36%;
      height: 55%;
      background: #2c261f;
      clip-path: polygon(0 100%, 0 35%, 24% 12%, 48% 34%, 48% 100%);
      opacity: 0.8;
    }

    .photo::after {
      content: "";
      position: absolute;
      right: 10%;
      bottom: 0;
      width: 46%;
      height: 35%;
      background:
        radial-gradient(circle at 12% 45%, #221d19 0 6px, transparent 7px),
        radial-gradient(circle at 34% 42%, #221d19 0 6px, transparent 7px),
        radial-gradient(circle at 56% 45%, #221d19 0 6px, transparent 7px),
        radial-gradient(circle at 78% 42%, #221d19 0 6px, transparent 7px);
      opacity: 0.85;
    }

    .answer-label {
      margin-top: 14px;
      margin-bottom: 8px;
      font-size: 13px;
      letter-spacing: 0.08em;
    }

    .answer-box {
      display: flex;
      gap: 8px;
      justify-content: center;
      align-items: center;
      margin: 0 auto;
      max-width: 300px;
    }

    input {
      width: 100%;
      height: 38px;
      padding: 8px 10px;
      border: 1px solid #4a3424;
      background: rgba(255, 248, 226, 0.8);
      color: #2a1b10;
      font-size: 16px;
      text-align: center;
      letter-spacing: 0.08em;
      font-family: "Georgia", "Yu Mincho", serif;
      outline: none;
      box-shadow: inset 0 2px 6px rgba(60, 30, 10, 0.18);
    }

    input:focus {
      border: 2px solid #1f3448;
      background: rgba(255, 252, 235, 0.95);
    }

    button {
      white-space: nowrap;
      height: 38px;
      padding: 0 16px;
      border: 1px solid #15283b;
      border-radius: 18px;
      background: #1f3448;
      color: #fff8e6;
      font-size: 14px;
      font-weight: bold;
      font-family: "Yu Gothic", "Hiragino Sans", sans-serif;
      cursor: pointer;
      box-shadow: 0 3px 0 rgba(0,0,0,0.25);
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 rgba(0,0,0,0.25);
    }

    #message {
      min-height: 28px;
      margin: 18px 0 0;
      font-size: 14px;
      line-height: 1.8;
      color: #2c1b10;
    }

    .seal {
      margin: 18px auto 0;
      width: 42px;
      height: 42px;
      border: 1px solid rgba(55, 33, 20, 0.7);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: rgba(45, 28, 16, 0.8);
    }

    @media (max-width: 380px) {
      .logo {
        font-size: 32px;
      }

      .paper {
        padding: 28px 18px 24px;
      }

      .lead {
        font-size: 13px;
      }

      .answer-box {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="page-title">UNLOCK Answer</div>

  <main class="paper">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="content">
      <div class="logo">UNLOCK</div>
      <div class="series">SERIES</div>

      <div class="ornament"><span>◆</span></div>

      <p class="lead">
        いつかの写真を思い出す。<br>
        忘れられないあの瞬間。<br>
        アルバムを開き、そっと見つけた一枚の写真。
      </p>

      <div class="photo-frame">
        <div class="photo" aria-label="古い別荘と記憶の写真"></div>
      </div>

      <p class="answer-label">導かれた数字は</p>

      <div class="answer-box">
        <input id="answer" type="text" placeholder="ANSWER" autocomplete="off">
        <button onclick="checkAnswer()">解錠する</button>
      </div>

      <p id="message"></p>

      <div class="seal">⌘</div>
    </div>
  </main>

  <script>
    function normalize(text) {
      return text
        .trim()
        .toLowerCase()
        .replace(/\s+/g, "")
        .replace(/[０-９]/g, function(s) {
          return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
        });
    }

    function checkAnswer() {
      const answer = normalize(document.getElementById("answer").value);

      // 正解を変える場合はここを書き換えます
      const correctAnswers = ["memory", "7457734"];

      if (correctAnswers.includes(answer)) {
        document.getElementById("message").innerHTML =
          "カチリ、と小さな音がした。<br>写真の裏に、まだ見ぬ場所の記憶が浮かび上がる。";
      } else {
        document.getElementById("message").textContent =
          "鍵はまだ開かないようだ。";
      }
    }
  </script>
</body>
</html>
